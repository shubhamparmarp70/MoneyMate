server.port=8085

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/project
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:your_password}

# ===============================
# JPA / Hibernate
# ===============================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# Email configuration
# ===============================
spring.mail.protocol=smtp
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your_email@example.com}
spring.mail.password=${MAIL_PASSWORD:your_smtp_password}
spring.mail.properties.mail.smtp.from=${MAIL_FROM:noreply@example.com}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.debug=true

# ===============================
# JWT Configuration
# ===============================
jwt.secret=${JWT_SECRET:your_jwt_secret_key}
jwt.expiration=86400000